<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: #121212; color: white; }
        #login-screen { position: fixed; inset: 0; background: #121212; display: flex; align-items: center; justify-content: center; z-index: 20; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        #chat-screen { display: none; flex-direction: column; height: 100vh; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; list-style: none; margin: 0; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; word-wrap: break-word; }
        .received { background: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        .sent { background: #007bff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .user-label { font-size: 0.7rem; color: #aaa; margin-bottom: 2px; display: block; }
        #form { padding: 15px; background: #1e1e1e; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #333; color: white; outline: none; }
        button { background: #007bff; color: white; border: none; padding: 0 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="card">
            <h2>Chat</h2>
            <input type="text" id="nick" placeholder="Username..." style="width: 100%; margin-bottom: 15px;">
            <button id="join-btn" style="width: 100%; padding: 12px;">Join</button>
        </div>
    </div>
    <div id="chat-screen">
        <ul id="messages"></ul>
        <form id="form">
            <input id="input" autocomplete="off" placeholder="Message..." />
            <button>Send</button>
        </form>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "";
        document.getElementById('join-btn').onclick = () => {
            const val = document.getElementById('nick').value;
            if(val) {
                myName = val;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                socket.emit('user-joined', myName);
            }
        };
        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('input');
            if (input.value) {
                socket.emit('chat-msg', { user: myName, text: input.value });
                input.value = '';
            }
        };
        socket.on('chat-msg', (data) => {
            const li = document.createElement('li');
            li.className = `msg ${data.user === myName ? 'sent' : 'received'}`;
            const label = document.createElement('span');
            label.className = 'user-label';
            label.textContent = data.user;
            const content = document.createElement('div');
            content.textContent = data.text;
            li.appendChild(label);
            li.appendChild(content);
            document.getElementById('messages').appendChild(li);
            const msgDiv = document.getElementById('messages');
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });
    </script>
</body>
</html>
